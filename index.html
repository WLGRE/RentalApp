<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rental Application</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'DM Sans', sans-serif; background:#faf9f6; margin:0; }
.form-container { max-width:700px; margin:auto; padding:20px; }
.field { margin-bottom:15px; }
input, textarea { width:100%; padding:8px; }
button { padding:12px 20px; cursor:pointer; }
</style>
</head>

<body>

<div class="form-container">
<h2>Rental Application</h2>

<form id="rental-form">

<div class="field">
<label>Full Name *</label>
<input name="legal_name" required>
</div>

<div class="field">
<label>Email *</label>
<input name="email" type="email" required>
</div>

<div class="field">
<label>Phone *</label>
<input name="phone_primary" required>
</div>

<div class="field">
<label>Property Address *</label>
<input name="prop_address" required>
</div>

<div class="field">
<label>Move-in Date *</label>
<input type="date" name="move_in" required>
</div>

<div class="field">
<label>Annual Income *</label>
<input type="number" name="annual_income" required>
</div>

<div class="field">
<label>Signature *</label>
<canvas id="sig-canvas" style="border:1px solid #ccc; width:100%; height:120px;"></canvas>
<button type="button" onclick="clearSignature()">Clear</button>
</div>

<div class="field">
<label>Date *</label>
<input type="date" id="sig_date" name="sig_date" required>
</div>

<button type="submit">Submit</button>

</form>

<div id="success" style="display:none;">
<h2>Submitted Successfully</h2>
</div>

</div>

<script>
/* ✅ FIXED URL */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzelQZHVXWmfayxq1HSDVhfjfnGM88BEqK-OXtOOFcpOfeGmVYwgE_DT1hde-sWFWin/exec';

/* SIGNATURE */
const canvas = document.getElementById('sig-canvas');
const ctx = canvas.getContext('2d');

let drawing = false;
let hasSig = false;

function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = 120 * dpr;
  ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

canvas.addEventListener('mousedown', e => {
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
});

canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  hasSig = true;
});

canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  hasSig = true;
}, { passive:false });

canvas.addEventListener('touchend', () => drawing = false);

function clearSignature() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  hasSig = false;
}

/* AUTO DATE */
document.getElementById('sig_date').valueAsDate = new Date();

/* SUBMIT */
document.getElementById('rental-form').addEventListener('submit', async function(e){
  e.preventDefault();

  if (!hasSig) {
    alert('Signature required');
    return;
  }

  const formData = new FormData(this);
  const data = {};

  formData.forEach((v,k)=> data[k]=v);
  data.signature = canvas.toDataURL();

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (result.result === "success") {
      document.getElementById('rental-form').style.display='none';
      document.getElementById('success').style.display='block';
    } else {
      alert('Submission failed');
    }

  } catch(err) {
    alert('Network error');
  }
});
</script>

</body>
</html>
